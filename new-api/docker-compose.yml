# New-API Docker Compose Configuration
#
# Quick Start (SQLite, 最省事):
#   1) docker compose up -d
#   2) open http://localhost:3000
#
# 说明:
# - 默认使用 SQLite（无需额外数据库容器），数据会落到 ./data。
# - 如需 MySQL/PostgreSQL/Redis：使用 profiles 启动对应服务，并把 SQL_DSN/REDIS_CONN_STRING 切换到相应值。
# - 生产环境务必修改密码与 SESSION_SECRET。

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # MySQL（你当前使用 MySQL：已默认启用）
      # 如需切回 SQLite，把下一行注释并启用 sqlite3://data/new-api.db
      - "SQL_DSN=root:1qaz%40WSX@tcp(10.254.15.6:3306)/lxzp_evaluate_data?parseTime=true"
      # - SQL_DSN=sqlite3://data/new-api.db

      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true

      # 生产环境建议设置（示例）:
      # - SESSION_SECRET=PLEASE_CHANGE_ME_TO_A_RANDOM_STRING
      # - STREAMING_TIMEOUT=300
    # If you use an external MySQL (e.g. 10.254.15.6), you do NOT need to start the mysql service below.
    # If you want to run MySQL/PostgreSQL via Docker, start with profiles:
    #   docker compose --profile mysqldocker up -d
    #   docker compose --profile postgres up -d
    networks:
      - new-api-network
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选 PostgreSQL：
  #   1) docker compose --profile postgres up -d
  #   2) 把 new-api 的 SQL_DSN 改为：postgresql://root:CHANGE_ME@postgres:5432/new-api
  postgres:
    image: postgres:15
    container_name: new-api-postgres
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: new-api
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 可选 MySQL：
  #   1) docker compose --profile mysql up -d
  #   2) 把 new-api 的 SQL_DSN 改为：root:CHANGE_ME@tcp(mysql:3306)/new-api?parseTime=true
  mysql:
    image: mysql:8.2
    container_name: new-api-mysql
    restart: unless-stopped
    profiles: ["mysqldocker"]
    environment:
      MYSQL_ROOT_PASSWORD: 1qaz@WSX
      MYSQL_DATABASE: lxzp_evaluate_data
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - new-api-network
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  pg_data:
  mysql_data:

networks:
  new-api-network:
    driver: bridge
